<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS PRO Calculator</title>
<style>
body{
 margin:0;
 background:linear-gradient(135deg,#0b0f1a,#020617);
 font-family:Consolas;
 color:white;
}.calculator{ width:100vw; height:100vh; display:flex; flex-direction:column; padding:10px; box-sizing:border-box; }

#display{ height:80px; font-size:30px; padding:15px; background:#020617; border:none; border-radius:12px; text-align:right; color:#00eaff; box-shadow:0 0 15px #00eaff33 inset; }

#history{ height:70px; overflow:auto; font-size:13px; color:#00eaff; margin:6px 0; }

.topbar{ display:flex; justify-content:space-between; margin-bottom:5px; }

button{ padding:14px; font-size:16px; border:none; border-radius:12px; cursor:pointer; transition:0.2s; }

button:active{transform:scale(0.95)}

.buttons{ flex:1; display:grid; grid-template-columns:repeat(5,1fr); gap:8px; overflow:auto; }

.num{background:#00eaff;color:#000} .operator{background:#ff9f43} .equal{background:#2ecc71;grid-column:span 2} .clear{background:#ff3b3b;color:white} .memory{background:#8e44ad;color:white} .voice{background:#f1c40f} .mode{background:#3498db;color:white}

</style>
</head>
<body><div class="calculator"><div class="topbar">
<button class="mode" onclick="toggleTheme()">Theme</button>
<button class="voice" onclick="startVoice()">🎤</button>
</div><input id="display" disabled>
<div id="history"></div><div class="buttons">
<button onclick="clearDisplay()" class="clear">C</button>
<button onclick="append('(')" class="num">(</button>
<button onclick="append(')')" class="num">)</button>
<button onclick="append('%')" class="num">%</button>
<button onclick="backspace()" class="num">⌫</button><button onclick="append('7')" class="num">7</button> <button onclick="append('8')" class="num">8</button> <button onclick="append('9')" class="num">9</button> <button onclick="append('/')" class="operator">÷</button> <button onclick="sqrt()" class="num">√</button>

<button onclick="append('4')" class="num">4</button> <button onclick="append('5')" class="num">5</button> <button onclick="append('6')" class="num">6</button> <button onclick="append('*')" class="operator">×</button> <button onclick="power()" class="num">x²</button>

<button onclick="append('1')" class="num">1</button> <button onclick="append('2')" class="num">2</button> <button onclick="append('3')" class="num">3</button> <button onclick="append('-')" class="operator">−</button> <button onclick="sin()" class="num">sin</button>

<button onclick="append('0')" class="num">0</button> <button onclick="append('.')" class="num">.</button> <button onclick="log()" class="num">log</button> <button onclick="append('+')" class="operator">+</button> <button onclick="cos()" class="num">cos</button>

<button onclick="tan()" class="num">tan</button> <button onclick="factorial()" class="num">n!</button> <button onclick="pi()" class="num">π</button> <button onclick="e()" class="num">e</button> <button onclick="calculate()" class="equal">=</button>

<button onclick="memoryAdd()" class="memory">M+</button> <button onclick="memorySubtract()" class="memory">M-</button> <button onclick="memoryRecall()" class="memory">MR</button> <button onclick="memoryClear()" class="memory">MC</button>

</div>
</div><script>
let display=document.getElementById("display");
let historyDiv=document.getElementById("history");
let memory=0;
let dark=true;

function append(v){display.value+=v}
function clearDisplay(){display.value=""}
function backspace(){display.value=display.value.slice(0,-1)}

function calculate(){
 try{
  let safe=display.value.replace(/[^0-9+\-*/%.()]/g,'');
  let result=eval(safe);
  historyDiv.innerHTML+=safe+" = "+result+"<br>";
  display.value=result;
  speak(result);
 }catch{display.value="Error"}
}

function sqrt(){display.value=Math.sqrt(eval(display.value))}
function power(){display.value=Math.pow(eval(display.value),2)}
function sin(){display.value=Math.sin(eval(display.value)*Math.PI/180)}
function cos(){display.value=Math.cos(eval(display.value)*Math.PI/180)}
function tan(){display.value=Math.tan(eval(display.value)*Math.PI/180)}
function log(){display.value=Math.log10(eval(display.value))}

function factorial(){let n=eval(display.value);if(n<0)return display.value="Error";let r=1;for(let i=2;i<=n;i++)r*=i;display.value=r}
function pi(){display.value+=Math.PI}
function e(){display.value+=Math.E}

function memoryAdd(){memory+=Number(display.value)||0}
function memorySubtract(){memory-=Number(display.value)||0}
function memoryRecall(){display.value=memory}
function memoryClear(){memory=0}

function speak(text){
 if(!('speechSynthesis'in window))return;
 window.speechSynthesis.cancel();
 let s=new SpeechSynthesisUtterance(text);
 s.lang='en-US';
 window.speechSynthesis.speak(s);
}

function startVoice(){
 const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
 rec.start();

 rec.onresult=function(e){
  let text=e.results[0][0].transcript.toLowerCase();
  let hasEquals=text.includes("equal")||text.includes("equals");

  let clean=text.replace(/equals?/g,'').trim();

  let expr=clean
   .replace(/plus/g,'+')
   .replace(/minus/g,'-')
   .replace(/multiply|into/g,'*')
   .replace(/divide|divided by/g,'/')
   .replace(/percent/g,'%')
   .replace(/ /g,'');

  if(hasEquals){
    try{
      let safe=expr.replace(/[^0-9+\-*/%.()]/g,'');
      let result=eval(safe);
      historyDiv.innerHTML+=safe+" = "+result+"<br>";
      display.value=result;
      speak(result);
    }catch{display.value="Error"}
  }else{
    display.value=expr;
  }
 }
}

function toggleTheme(){
 dark=!dark;
 if(dark){
  document.body.style.background="linear-gradient(135deg,#0b0f1a,#020617)";
 }else{
  document.body.style.background="#ffffff";
 }
}
</script></body>
</html>
